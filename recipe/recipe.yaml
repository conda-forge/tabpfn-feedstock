schema_version: 1

context:
  name: tabpfn
  version: "7.1.1"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/tabpfn-${{ version }}.tar.gz
  sha256: 9174529f57754d9a71774f7ee376b95c72ddb455df21e54bc1fddb7dac019f8b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - joblib >=1.2.0
    - tabpfn-common-utils >=0.2.13
    - python >=${{ python_min }}
    - einops >=0.4.0
    - eval-type-backport >=0.2.2
    - pandas >=1.4.0
    - pydantic >=2.8.0
    - pydantic-settings >=2.10.1
    - pytorch >=2.5
    - scikit-learn >=1.2.0
    - scipy >=1.11.1
    - typing_extensions >=4.12.0
    - numpy >=1.21.6
    - huggingface_hub >=0.19.0
    - filelock >=3.11.0
tests:
  - python:
      imports:
        - tabpfn
      pip_check: true

      python_version: ${{ python_min }}.*
about:
  summary: Foundation model for tabular data
  license: Apache-2.0
  license_file:
    - LICENSE
  homepage: https://github.com/PriorLabs/TabPFN

extra:
  recipe-maintainers:
    - anuprulez
    - janjagusch
